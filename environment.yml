# Multi-verse + analysis stack. louvain and jaxlib are pip-only: conda louvain often
# fails to solve/build; a pinned jaxlib avoids JAX stack resolver errors.
name: multiverse
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - ipykernel
  - cmake
  - pytorch
  - scvi-tools==1.2.0
  - scanpy==1.10.3
  - pip:
    - mofapy2==0.7.2
    - mowgli==0.1.0
    - scib==1.1.5
    - scib-metrics
    - muon==0.1.7
    - jaxlib==0.4.34
    - louvain==0.8.2
    - pydantic>=2.0
    - docker>=6.1.3
    - rich>=13.0
    - streamlit>=1.55.0
    - anndata
    - mudata
    - pandas
    - matplotlib
    - numpy
    - pyyaml
    - "cobolt @ git+https://github.com/epurdom/cobolt.git"
    - pytest
