name: multiverse_multivi
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - pip
  - ipykernel
  - python=3.11
  # pytorch-cuda is provided by the pytorch channel (use pytorch:: prefix).
  - pytorch::pytorch
  - pytorch::pytorch-cuda=12.1
  - scvi-tools==1.2.0
  - scanpy==1.10.3
  # jax/jaxlib come from conda-forge via scvi-tools; do not pip-pin jaxlib here — pip
  # cannot replace conda-installed jaxlib (no RECORD / uninstall-no-record-file).
  - pip:
      - muon==0.1.7
      - louvain==0.8.2
