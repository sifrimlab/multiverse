# WNN: CPU stack — pyWNN installed from GitHub, dependencies aligned with project pins.
name: multiverse_wnn
channels:
  - conda-forge
dependencies:
  - pip
  - ipykernel
  - git
  - python=3.11
  - scanpy==1.11.1
  - scikit-learn==1.5.2
  - scikit-misc==0.5.2
  - pytorch
  - pip:
      - anndata==0.11.4
      - zarr<3
      - muon==0.1.7
      - mudata==0.3.1
