globals:
  experiment_name: benchmark_run
  random_seed: 92
  run_user_params: true
  run_gridsearch: false
jobs:
- dataset_slug: pbmc10k
  model_name: WNN
  model_params:
    modality_1: rna
    modality_2: atac
    n_neighbors: 20
    n_pcs_per_modality: 30
    device: cpu
    umap_random_state: 92
    umap_color_type: cell_type
  mem_limit: 16g
- dataset_slug: teaseq
  model_name: WNN
  model_params:
    modality_1: rna
    modality_2: atac
    n_neighbors: 20
    n_pcs_per_modality: 30
    device: cpu
    umap_random_state: 92
    umap_color_type: cell_type
  mem_limit: 16g
